name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: windows-${{ hashFiles('native/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc
        working-directory: native

      - name: Download Chromium
        shell: bash
        run: |
          mkdir -p chromium
          # Get latest Chrome for Testing version
          VERSION=$(curl -s "https://googlechromelabs.github.io/chrome-for-testing/last-known-good-versions-with-downloads.json" | python -c "import sys,json; d=json.load(sys.stdin); print(d['channels']['Stable']['version'])")
          echo "Chrome version: $VERSION"
          curl -L -o chrome-win64.zip "https://storage.googleapis.com/chrome-for-testing-public/${VERSION}/win64/chrome-win64.zip"
          unzip -o chrome-win64.zip
          mv chrome-win64/* chromium/
          rm -rf chrome-win64 chrome-win64.zip
          ls -la chromium/
          echo "CHROME_VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Prepare installer files
        shell: bash
        run: |
          mkdir -p installer_files
          cp native/target/x86_64-pc-windows-msvc/release/ruva-browser.exe installer_files/
          cp native/icon.ico installer_files/
          cp LICENSE installer_files/
          cp -r chromium installer_files/

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build NSIS installer
        shell: bash
        run: |
          cp -r installer_files packaging/
          NSIS_PATH="/c/Program Files (x86)/NSIS/makensis.exe"
          "$NSIS_PATH" packaging/installer.nsi
          ls -la packaging/RuvaBrowser-Setup.exe
          mv packaging/RuvaBrowser-Setup.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RuvaBrowser-Setup
          path: RuvaBrowser-Setup.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RuvaBrowser-Setup.exe
          draft: false
          prerelease: false
