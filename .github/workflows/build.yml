name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install NSIS
        uses: mlugg/setup-nsis@v1

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: windows-${{ hashFiles('native/Cargo.lock') }}

      - name: Build release
        working-directory: native
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Find WebView2Loader.dll
        id: find_dll
        working-directory: native
        shell: bash
        run: |
          DLL=$(find target/x86_64-pc-windows-msvc/release/build -name "WebView2Loader.dll" -path "*/x64/*" | head -1)
          echo "dll_path=$DLL" >> $GITHUB_OUTPUT

      - name: Prepare installer files
        shell: bash
        run: |
          mkdir -p installer_files
          cp native/target/x86_64-pc-windows-msvc/release/ruva-browser.exe installer_files/
          cp "${{ steps.find_dll.outputs.dll_path }}" installer_files/
          cp native/icon.ico installer_files/
          cp LICENSE installer_files/

      - name: Download WebView2 bootstrapper
        working-directory: installer_files
        shell: bash
        run: |
          curl -L -o MicrosoftEdgeWebview2Setup.exe "https://go.microsoft.com/fwlink/p/?LinkId=2124703"

      - name: Build NSIS installer
        uses: thepwagner/action-nsis@v2
        with:
          source-file: packaging/installer.nsi
          defines: |
            NSIS_DEFINES=NSIS_MAX_INSTDIR_LENGTH=260

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RuvaBrowser-Setup
          path: RuvaBrowser-Setup.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RuvaBrowser-Setup.exe
          draft: false
          prerelease: false
