name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: windows-${{ hashFiles('native/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc
        working-directory: native

      - name: Find WebView2Loader.dll
        id: find_dll
        shell: bash
        run: DLL=$(find native/target/x86_64-pc-windows-msvc/release/build -name "WebView2Loader.dll" -path "*/x64/*" | head -1) && echo "dll_path=$DLL" >> $GITHUB_OUTPUT

      - name: Prepare installer files
        shell: bash
        run: |
          mkdir -p installer_files
          cp native/target/x86_64-pc-windows-msvc/release/ruva-browser.exe installer_files/
          cp "$DLL" installer_files/
          cp native/icon.ico installer_files/
          cp LICENSE installer_files/
          curl -L -o installer_files/MicrosoftEdgeWebview2Setup.exe "https://go.microsoft.com/fwlink/p/?LinkId=2124703"
          ls -la installer_files/
        env:
          DLL: ${{ steps.find_dll.outputs.dll_path }}

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build NSIS installer
        shell: bash
        run: |
          cp -r installer_files packaging/
          NSIS_PATH="/c/Program Files (x86)/NSIS/makensis.exe"
          "$NSIS_PATH" packaging/installer.nsi
          ls packaging/RuvaBrowser-Setup.exe
          mv packaging/RuvaBrowser-Setup.exe .
