name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            native/target
          key: windows-${{ hashFiles('native/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc
        working-directory: native

      - name: Prepare installer files
        shell: bash
        run: |
          mkdir -p installer_files
          cp native/target/x86_64-pc-windows-msvc/release/ruva-browser.exe installer_files/
          cp native/icon.ico installer_files/
          cp LICENSE installer_files/

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build NSIS installer
        shell: bash
        run: |
          cp -r installer_files packaging/
          NSIS_PATH="/c/Program Files (x86)/NSIS/makensis.exe"
          "$NSIS_PATH" packaging/installer.nsi
          ls packaging/RuvaBrowser-Setup.exe
          mv packaging/RuvaBrowser-Setup.exe .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RuvaBrowser-Setup
          path: RuvaBrowser-Setup.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: RuvaBrowser-Setup.exe
          draft: false
          prerelease: false
