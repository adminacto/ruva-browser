<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #2b2b2b; color: #ccc; height: 40px; display: flex; align-items: center; padding: 0 8px; gap: 6px; border-bottom: 1px solid #444; -webkit-app-region: drag; user-select: none; }
button, input { -webkit-app-region: no-drag; }
.btn { background: #3b3b3b; border: 1px solid #555; color: #ccc; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 14px; line-height: 1; min-width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }
.btn:hover { background: #4a4a4a; border-color: #666; }
.btn:active { background: #555; }
.url-bar { flex: 1; background: #1a1a1a; border: 1px solid #555; color: #e0e0e0; padding: 4px 12px; border-radius: 14px; font-size: 13px; height: 28px; outline: none; }
.url-bar:focus { border-color: #4a90d9; }
.tab-bar { display: flex; gap: 4px; align-items: center; overflow-x: auto; max-width: 300px; flex-shrink: 0; }
.tab { background: #333; border: 1px solid #555; color: #aaa; padding: 2px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; white-space: nowrap; max-width: 120px; overflow: hidden; text-overflow: ellipsis; height: 24px; display: flex; align-items: center; }
.tab.active { background: #4a90d9; color: #fff; border-color: #4a90d9; }
.tab .close { margin-left: 6px; font-size: 10px; opacity: 0.6; cursor: pointer; }
.tab .close:hover { opacity: 1; }
.sep { width: 1px; height: 20px; background: #555; flex-shrink: 0; }
</style>
</head>
<body>
<button class="btn" onclick="window.ipc.postMessage(JSON.stringify({cmd:'navigate',url:''}))" title="New Tab">+</button>
<button class="btn" onclick="history.back()" title="Back">←</button>
<button class="btn" onclick="history.forward()" title="Forward">→</button>
<button class="btn" onclick="location.reload()" title="Reload">⟳</button>
<button class="btn" onclick="window.ipc.postMessage(JSON.stringify({cmd:'navigate',url:''}))" title="Home">⌂</button>
<input class="url-bar" id="urlBar" placeholder="Enter URL or search..." onkeydown="if(event.key==='Enter'){window.ipc.postMessage(JSON.stringify({cmd:'navigate',url:this.value}));this.blur();}">
<button class="btn" onclick="window.ipc.postMessage(JSON.stringify({cmd:'open_settings'}))" title="Settings">☰</button>
</body>
</html>
