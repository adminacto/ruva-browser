<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:#1a1a1a;color:#d1d5db;
  height:100vh;display:flex;align-items:center;justify-content:center;
  overflow:hidden;user-select:none;
}
.center{
  display:flex;flex-direction:column;align-items:center;gap:20px;
  width:100%;max-width:600px;padding:0 24px;
  animation:fadeIn .5s ease;
}
.clock{font-size:60px;font-weight:200;line-height:1;letter-spacing:1px;color:var(--clock-color,#e5e7eb)}
.clock-separator{opacity:.5}
.greeting{font-size:18px;font-weight:400;color:var(--greeting-color,#9ca3af)}
.date-text{font-size:11px;letter-spacing:1px;text-transform:uppercase;opacity:.5}
.search{width:100%;position:relative}
.search input{
  width:100%;height:46px;
  background:var(--search-bg,#3b3b3b);border:1px solid #444;border-radius:24px;
  padding:0 44px 0 20px;color:#e5e7eb;font-size:14px;outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.search input:focus{border-color:#666;box-shadow:0 0 0 3px rgba(85,85,85,.2)}
.search input::placeholder{color:#6b7280}
.search-icon{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  color:#6b7280;font-size:16px;pointer-events:none;
}
.shortcuts{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:520px}
.shortcut{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  padding:14px 8px;border-radius:12px;
  background:#262626;border:1px solid #333;
  cursor:pointer;transition:all .2s;text-decoration:none;color:inherit;
}
.shortcut:hover{background:#2a2a2a;border-color:#444}
.shortcut:active{transform:scale(.97)}
.shortcut-icon{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;background:#333;
}
.shortcut:hover .shortcut-icon{background:#3a3a3a}
.shortcut-label{font-size:11px;color:#9ca3af;font-weight:500}
.hints{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;font-size:11px;opacity:.4;margin-top:4px}
.hints kbd{
  display:inline-block;padding:2px 7px;
  background:#262626;border:1px solid #333;border-radius:4px;
  font-size:10px;font-family:inherit;color:#9ca3af;
}
.ai-box{
  width:100%;max-width:520px;
  background:#262626;border:1px solid #333;border-radius:14px;
  padding:14px;animation:slideUp .4s ease;
}
.ai-header{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
  font-size:13px;color:#6366f1;font-weight:600;
}
.ai-dot{width:8px;height:8px;border-radius:50%;background:#6366f1;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ai-input-row{display:flex;gap:8px}
.ai-input{
  flex:1;height:38px;background:#1a1a1a;border:1px solid #333;border-radius:10px;
  padding:0 12px;color:#e5e7eb;font-size:13px;outline:none;
  -webkit-appearance:none !important;
}
.ai-input:focus{border-color:#555}
.ai-input::placeholder{color:#555}
.ai-send{
  width:38px;height:38px;background:#6366f1;border:none;border-radius:10px;
  color:white;font-size:16px;cursor:pointer;transition:background .2s;
  display:flex;align-items:center;justify-content:center;
}
.ai-send:hover{background:#5558e6}
.ai-response{
  margin-top:10px;padding:10px 12px;
  background:#1a1a1a;border-radius:10px;
  font-size:13px;line-height:1.6;color:#d1d5db;
  display:none;max-height:200px;overflow-y:auto;
  word-break:break-word;
}
.ai-loading{
  display:none;margin-top:10px;padding:10px;
  text-align:center;color:#6366f1;font-size:13px;
}
</style>
</head>
<body>
<div class="center">
  <div class="clock" id="clock"></div>
  <div class="greeting" id="greeting"></div>
  <div class="date-text" id="dateText"></div>
  <div class="search">
    <input type="text" id="searchInput" placeholder="Поиск или URL..." autofocus>
    <span class="search-icon">&#128270;</span>
  </div>
  <div class="shortcuts" id="shortcuts"></div>
  <div class="ai-box" id="aiBox">
    <div class="ai-header"><div class="ai-dot"></div>AI Ассистент</div>
    <div class="ai-input-row">
      <input class="ai-input" id="aiInput" placeholder="Спросите что угодно..." type="text">
      <button class="ai-send" id="aiSend">&#10148;</button>
    </div>
    <div class="ai-loading" id="aiLoading">&#8987; Думаю...</div>
    <div class="ai-response" id="aiResponse"></div>
  </div>
  <div class="hints">
    <span><kbd>Ctrl+T</kbd> вкладка</span>
    <span><kbd>Ctrl+W</kbd> закрыть</span>
    <span><kbd>Ctrl+L</kbd> адрес</span>
    <span><kbd>Ctrl+R</kbd> обновить</span>
  </div>
</div>
<script>
var NTP=window.__NTP__||{};
var SEARCH_URL=window.__SEARCH_URL__||'https://duckduckgo.com/?q=';

function sendIpc(cmd,data){
  try{var m=Object.assign({cmd:cmd},data||{});window.webkit.messageHandlers.ipc.postMessage(JSON.stringify(m))}catch(e){}
}

function updateClock(){
  var n=new Date(),h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();
  var use24=NTP.clock_format_24h!==false;
  var displayH=h;
  var suffix='';
  if(!use24){suffix=h>=12?' PM':' AM';displayH=h%12||12;}
  document.getElementById('clock').innerHTML=
    (displayH<10?'0':'')+displayH+'<span class="clock-separator">:</span>'+
    (m<10?'0':'')+m+'<span class="clock-separator">:</span>'+
    (s<10?'0':'')+s+suffix;
  var g='';
  if(h<6)g='\u{1f319} Доброй ночи';
  else if(h<12)g='\u{2600}\u{fe0f} Доброе утро';
  else if(h<18)g='\u{1f324}\u{fe0f} Добрый день';
  else g='\u{1f319} Добрый вечер';
  document.getElementById('greeting').innerHTML=g;
  var days=['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
  var months=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  document.getElementById('dateText').textContent=
    days[n.getDay()]+', '+n.getDate()+' '+months[n.getMonth()]+' '+n.getFullYear();
}

function nav(url){sendIpc('navigate',{url:url})}

function renderShortcuts(){
  var c=document.getElementById('shortcuts');
  c.innerHTML='';
  var links=NTP.quick_links||[];
  links.forEach(function(l){
    var d=document.createElement('div');
    d.className='shortcut';
    d.setAttribute('data-url',l.url);
    d.innerHTML='<div class="shortcut-icon">'+l.icon+'</div><span class="shortcut-label">'+l.name+'</span>';
    d.addEventListener('click',function(){nav(l.url)});
    c.appendChild(d);
  });
}

function applyNtpStyle(){
  var r=document.documentElement;
  if(NTP.clock_color)r.style.setProperty('--clock-color',NTP.clock_color);
  if(NTP.greeting_color)r.style.setProperty('--greeting-color',NTP.greeting_color);
  if(NTP.search_color)r.style.setProperty('--search-bg',NTP.search_color);
  if(NTP.show_clock===false)document.getElementById('clock').style.display='none';
  if(NTP.show_greeting===false)document.getElementById('greeting').style.display='none';
  if(NTP.show_date===false)document.getElementById('dateText').style.display='none';
  if(NTP.show_ai_chat===false)document.getElementById('aiBox').style.display='none';
}

document.getElementById('searchInput').addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var v=this.value.trim();if(!v)return;
    var url=v;
    if(!/^https?:\/\//i.test(v)&&!v.includes('.')){url=SEARCH_URL+encodeURIComponent(v)}
    else if(!/^https?:\/\//i.test(v)){url='https://'+v}
    nav(url);
  }
});

document.getElementById('aiSend').addEventListener('click',function(){
  var v=document.getElementById('aiInput').value.trim();if(!v)return;
  document.getElementById('aiLoading').style.display='block';
  document.getElementById('aiResponse').style.display='none';
  sendIpc('ai_chat',{ai_prompt:v});
});
document.getElementById('aiInput').addEventListener('keydown',function(e){
  if(e.key==='Enter')document.getElementById('aiSend').click();
});

updateClock();setInterval(updateClock,1000);
applyNtpStyle();
renderShortcuts();
</script>
</body>
</html>
